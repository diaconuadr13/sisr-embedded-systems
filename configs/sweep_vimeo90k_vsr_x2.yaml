# Vimeo-90K inter-frame VSR comparison sweep.
# Runs the temporal baseline first, then the two recurrent VSR models.

experiments:
  - model_name: "VideoESPCN_Vimeo90K_x2_3f"
    arch: "VideoESPCN"
    dataset_name: "Vimeo90K"
    run_group: "vsr"
    dataset_type: "vimeo90k_raw"
    vimeo90k_raw_root: "data/raw/vimeo90k_kaggle"
    scale: 2
    num_frames: 3
    hidden_channels: 32
    patch_size: 0
    batch_size: 16
    epochs: 100
    lr: 0.001
    num_workers: 4
    device: "auto"
    amp: true
    grayscale: true
    augment: false
    samples_per_epoch: 16000
    val_samples: 948
    early_stopping_patience: 20
    early_stopping_min_delta: 0.0001

  - model_name: "VSRBasic_Vimeo90K_x2_5f"
    arch: "VSRBasic"
    dataset_name: "Vimeo90K"
    run_group: "vsr"
    dataset_type: "vimeo90k_raw"
    vimeo90k_raw_root: "data/raw/vimeo90k_kaggle"
    scale: 2
    num_frames: 5
    hidden_channels: 48
    num_blocks: 4
    patch_size: 0
    batch_size: 8
    epochs: 100
    lr: 0.0002
    num_workers: 4
    device: "auto"
    amp: true
    grayscale: true
    augment: false
    samples_per_epoch: 16000
    val_samples: 948
    early_stopping_patience: 20
    early_stopping_min_delta: 0.0001

  - model_name: "VSRPlusPlus_Vimeo90K_x2_7f"
    arch: "VSRPlusPlus"
    dataset_name: "Vimeo90K"
    run_group: "vsr"
    dataset_type: "vimeo90k_raw"
    vimeo90k_raw_root: "data/raw/vimeo90k_kaggle"
    scale: 2
    num_frames: 7
    hidden_channels: 64
    num_blocks: 5
    patch_size: 0
    batch_size: 4
    epochs: 100
    lr: 0.0002
    num_workers: 4
    device: "auto"
    amp: true
    grayscale: true
    augment: false
    samples_per_epoch: 16000
    val_samples: 948
    early_stopping_patience: 20
    early_stopping_min_delta: 0.0001
